<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 2rem; background-color: #f9f9f9; color: #333; }

p.description { color: #666; font-size: 0.9rem; margin-top: -1rem; margin-bottom: 1.5rem; }
.form-group { margin-bottom: 1rem; }

label small { font-weight: normal; color: #666; display: block; margin-top: 4px;}

/* 月別金額入力用のスタイル */

  padding: 1.5rem; 
  border-radius: 8px; 
  border: 1px solid #cce5ff;

}

}

}

}

button { background-color: #007bff; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; width: 100%; margin-top: 1rem;}
button:disabled { background-color: #a0a0a0; cursor: not-allowed; }
button:not(:disabled):hover { background-color: #0056b3; }
#message { margin-top: 1.5rem; padding: 1rem; border-radius: 5px; text-align: center; }
.success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
.error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
hr { border: none; border-top: 1px solid #eee; margin: 2rem 0; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle;}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-box { background: white; padding: 2rem; border-radius: 8px; max-width: 400px; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
.modal-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem; color: #d9534f; }
.modal-text { margin-bottom: 1.5rem; white-space: pre-wrap; line-height: 1.5; }
.modal-button { color: white; padding: 0.5rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin: 0 0.5rem; transition: background-color 0.2s; }
.btn-ok { background-color: #007bff; } .btn-ok:hover { background-color: #0056b3; }
.btn-yes { background-color: #007bff; } .btn-yes:hover { background-color: #0056b3; }
.btn-no { background-color: #6c757d; } .btn-no:hover { background-color: #5a6268; }
.input-error { background-color: #ffe6e6 !important; border: 1px solid #dc3545 !important; color: #721c24; }
</style>
</head>
<body>
<div class="header-nav">
<a href="<?= topUrl ?>" class="back-button" target="_top">← TOPに戻る</a>
</div>

<div class="container">
  <h1>MPコード新規登録フォーム</h1>
  <p class="description">ここでは「MPコードマスタ」の新規登録を行います。必須項目を正しく入力してください。</p>
  
  <form id="myForm">
  <div class="form-group">
  <label for="slideParentId">計画スライドの場合、親IDを指定（新規の場合は空欄）:
  <small>※親IDは 6 桁で入力してください</small>
  </label>
  <input type="text" id="slideParentId" name="slideParentId" placeholder="例: 000001" list="parent-id-list">
  <datalist id="parent-id-list"></datalist>
  </div>
  <hr>
  <h3>▼ 必須項目</h3>
  <div class="form-group">
  <label for="bu">対象BU:</label>
  <input type="text" id="bu" name="bu" required list="bu-list">
  <datalist id="bu-list"></datalist>
  </div>
  <div class="form-group">
  <label for="department">計上部門:</label>
  <input type="text" id="department" name="department" required list="department-list" placeholder="先に対象BUを選択してください" autocomplete="off">
  <datalist id="department-list"></datalist>
  </div>
  <div class="form-group">
  <label for="account">勘定科目:</label>
  <input type="text" id="account" name="account" required list="account-list">
  <datalist id="account-list"></datalist>
  </div>
  <div class="form-group">
  <label for="pjc">対象PJC:</label>
  <input type="text" id="pjc" name="pjc" list="pjc-list">
  <datalist id="pjc-list"></datalist>
  </div>

  <div class="form-group">
  <label>対象期間:</label>
  <div class="period-group">
    <input type="date" id="startDate" name="startDate" required onchange="generateMonthlyInputs()">
    <span>〜</span>
    <input type="date" id="endDate" name="endDate" required onchange="generateMonthlyInputs()">
  </div>
  </div>

  <div class="form-group" id="monthly-amounts-area" style="display:none;">
    <div class="monthly-container">
      <div class="monthly-title">各月の金額を入力してください：</div>
      <div id="monthly-grid"></div>
      <div class="monthly-total">
        合計: <span id="monthly-total-display">0</span> 円
      </div>
    </div>
  </div>

  <input type="hidden" id="amount" name="amount" required>

  <div class="form-group">
  <label for="summary">発番理由:</label>
  <input type="text" id="summary" name="summary" required>
  </div>

  <h3>▼ 任意項目</h3>
  <div class="form-group">
  <label for="vendor">仕入先:</label>
  <input type="text" id="vendor" name="vendor" list="vendor-list">
  <datalist id="vendor-list"></datalist>
  </div>

  <div class="form-group">
  <label for="notes">備考1:
  <small>※各月の按分金額等があれば記載してください</small>
  </label>
  <input type="text" id="notes" name="notes">
  </div>

  <button type="submit" id="submitButton" >登録する</button>
  </form>
  <div id="message" style="display:none;"></div>
  <a href="#" id="register-another" style="display:none; margin-top: 1rem; text-align: center; display: block;" >別のコードを登録する</a>
</div>

<div id="custom-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">入力エラー</div>
    <div class="modal-text" id="modal-message"></div>
    <div id="modal-buttons-ok" style="display: block;">
      <button class="modal-button btn-ok" id="modal-ok-btn">OK</button>
    </div>
    <div id="modal-buttons-yesno" style="display: none; justify-content: center;">
      <button class="modal-button btn-yes" id="modal-yes-btn">YES</button>
      <button class="modal-button btn-no" id="modal-no-btn">NO</button>
    </div>
  </div>
</div>

<script>
const myForm = document.getElementById('myForm');
const submitButton = document.getElementById('submitButton');
const messageDiv = document.getElementById('message');
const registerAnotherLink = document.getElementById('register-another');
const modalOverlay = document.getElementById('custom-modal');
const modalMessage = document.getElementById('modal-message');
const modalOkBtn = document.getElementById('modal-ok-btn');
let modalCallback = null;

const fieldValidations = [
  { id: 'slideParentId', list: 'parent-id-list', label: '親ID' },
  { id: 'bu', list: 'bu-list', label: '対象BU' },
  { id: 'department', list: 'department-list', label: '計上部門' },
  { id: 'account', list: 'account-list', label: '勘定科目' },
  { id: 'pjc', list: 'pjc-list', label: '対象PJC' },
  { id: 'vendor', list: 'vendor-list', label: '仕入先' }
];

document.addEventListener('DOMContentLoaded', () => {
  google.script.run
  .withSuccessHandler(response => {
    if (response.error) {
      alert("データの読み込みに失敗しました: " + response.error);
      return;
    }
    populateDatalist('parent-id-list')(response.parentIds);
    populateDatalist('bu-list')(response.bus);
    populateDatalist('pjc-list')(response.pjcs);
    populateDatalist('account-list')(response.accounts);
    populateDatalist('vendor-list')(response.vendors);
  })
  .getInitialFormData();

  document.getElementById('bu').addEventListener('change', updateDepartmentSuggestions);
  fieldValidations.forEach(v => setupStrictDatalist(v.id, v.list, v.label));

  document.getElementById('account').addEventListener('change', function() {
    const val = this.value.trim();
    const targetAccounts = ['ｼｽﾃﾑ利用料_その他', 'ｻｰﾊﾞｰ_ｸﾗｳﾄﾞ利用料'];
    
    if (targetAccounts.includes(val)) {
      const msg = '各クラウドサービス（AWS / GCP / Snowflake / Databricks / Azure）の費用は別途管理されており、MPコードの発番方法が異なります。\nこれらのクラウドサービスに含まれますか？';
      showConfirmModal('確認', msg, 
        () => {
          const supportMsg = '詳細は <a href="https://supership.slack.com/archives/C092J9B5TRV" target="_blank">#support-fpa</a> にお問い合わせください。';
          document.getElementById('modal-title').textContent = 'ご案内';
          document.getElementById('modal-title').style.color = '#007bff';
          document.getElementById('modal-message').innerHTML = supportMsg;
          document.getElementById('modal-buttons-ok').style.display = 'block';
          document.getElementById('modal-buttons-yesno').style.display = 'none';
          modalCallback = null; 
          submitButton.disabled = true;
        },
        () => {
          submitButton.disabled = false;
        }
      );
    } else {
       submitButton.disabled = false;
    }
  });

  modalOkBtn.addEventListener('click', () => {
    modalOverlay.style.display = 'none';
    if (modalCallback) { modalCallback(); modalCallback = null; }
  });
});

function parseNumber(value) {
  if (!value) return 0;
  const num = Number(value.toString().replace(/,/g, ''));
  return isNaN(num) ? 0 : num;
}

function formatAndCalculate(inputElement) {
  let val = inputElement.value.replace(/,/g, '').replace(/[^\d.-]/g, '');
  if (val !== '' && val !== '-') {
    inputElement.value = Number(val).toLocaleString();
  } else {
    inputElement.value = val;
  }
  calculateTotal();
}

function generateMonthlyInputs() {
  const startDateStr = document.getElementById('startDate').value;
  const endDateStr = document.getElementById('endDate').value;
  const area = document.getElementById('monthly-amounts-area');
  const grid = document.getElementById('monthly-grid');
  
  if (!startDateStr || !endDateStr || startDateStr > endDateStr) {
    area.style.display = 'none';
    grid.innerHTML = '';
    calculateTotal();
    return;
  }
  
  area.style.display = 'block';
  grid.innerHTML = '';
  
  const start = new Date(startDateStr);
  const end = new Date(endDateStr);
  
  let current = new Date(start.getFullYear(), start.getMonth(), 1);
  const targetEnd = new Date(end.getFullYear(), end.getMonth(), 1);
  
  const qContainers = {}; 
  
  while (current <= targetEnd) {
    const yyyy = current.getFullYear();
    const m = current.getMonth() + 1; 
    const mm = String(m).padStart(2, '0');
    const ym = `${yyyy}/${mm}`;
    const ts = current.getTime();
    
    const fiscalYear = m <= 3 ? yyyy - 1 : yyyy;
    let q = '';
    let qIndex = 0; 
    
    if (m >= 4 && m <= 6)      { q = '1Q'; qIndex = m - 4; }
    else if (m >= 7 && m <= 9) { q = '2Q'; qIndex = m - 7; }
    else if (m >= 10 && m <= 12){ q = '3Q'; qIndex = m - 10; }
    else                       { q = '4Q'; qIndex = m - 1; } 
    
    const qKey = `${fiscalYear}_${q}`;
    
    if (!qContainers[qKey]) {
      const qGroup = document.createElement('div');
      qGroup.className = 'quarter-group';
      
      const qLabel = document.createElement('div');
      qLabel.className = 'quarter-label';
      qLabel.innerText = `${fiscalYear}年度 ${q}`;
      qGroup.appendChild(qLabel);
      
      const qGrid = document.createElement('div');
      qGrid.className = 'quarter-grid';
      
      for(let i = 0; i < 3; i++){
        const slot = document.createElement('div');
        slot.className = 'monthly-item empty';
        qGrid.appendChild(slot);
      }
      qGroup.appendChild(qGrid);
      
      qContainers[qKey] = { group: qGroup, grid: qGrid };
      grid.appendChild(qGroup);
    }
    
    const targetSlot = qContainers[qKey].grid.children[qIndex];
    targetSlot.className = 'monthly-item';
    targetSlot.innerHTML = `
      <label>${ym}</label>
      <input type="text" name="monthly_${ts}" class="monthly-input" value="0" oninput="formatAndCalculate(this)" onfocus="this.select()">
    `;
    
    current.setMonth(current.getMonth() + 1);
  }
  calculateTotal();
}

function calculateTotal() {
  const inputs = document.querySelectorAll('.monthly-input');
  let total = 0;
  inputs.forEach(input => {
    total += parseNumber(input.value); 
  });
  
  const formattedTotal = total.toLocaleString();
  document.getElementById('monthly-total-display').innerText = formattedTotal;
  document.getElementById('amount').value = total; 
}

function showModal(message, callback, title = '入力エラー') {
  document.getElementById('modal-title').textContent = title;
  modalMessage.textContent = message; 
  document.getElementById('modal-buttons-ok').style.display = 'block';
  document.getElementById('modal-buttons-yesno').style.display = 'none';
  modalCallback = callback;
  modalOverlay.style.display = 'flex';
}

function showConfirmModal(title, message, onYes, onNo) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-title').style.color = '#333';
  modalMessage.innerHTML = message;
  document.getElementById('modal-buttons-ok').style.display = 'none';
  const yesnoDiv = document.getElementById('modal-buttons-yesno');
  yesnoDiv.style.display = 'flex';
  
  const yesBtn = document.getElementById('modal-yes-btn');
  const noBtn = document.getElementById('modal-no-btn');
  
  const newYesBtn = yesBtn.cloneNode(true);
  const newNoBtn = noBtn.cloneNode(true);
  yesBtn.parentNode.replaceChild(newYesBtn, yesBtn);
  noBtn.parentNode.replaceChild(newNoBtn, noBtn);
  
  newYesBtn.addEventListener('click', () => { if (onYes) onYes(); });
  newNoBtn.addEventListener('click', () => { modalOverlay.style.display = 'none'; if (onNo) onNo(); });
  
  modalOverlay.style.display = 'flex';
}

function setupStrictDatalist(inputId, datalistId, labelName) {
  const input = document.getElementById(inputId);
  input.addEventListener('change', function() {
    const val = this.value.trim();
    if (val === '') { this.classList.remove('input-error'); return; }
    const datalist = document.getElementById(datalistId);
    if (!datalist || datalist.options.length === 0) return;
    const options = Array.from(datalist.options).map(opt => opt.value);
    if (!options.includes(val)) {
      this.classList.add('input-error');
      showModal(`「${labelName}」はリストにある項目から選択してください。`, () => { setTimeout(() => input.focus(), 10); });
    } else {
      this.classList.remove('input-error');
    }
  });
}

function populateDatalist(datalistId) {
  return function(suggestions) {
    const datalist = document.getElementById(datalistId);
    datalist.innerHTML = '';
    if (suggestions && suggestions.length > 0) {
      suggestions.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        datalist.appendChild(option);
      });
    }
  };
}

function updateDepartmentSuggestions() {
  const selectedBu = document.getElementById('bu').value;
  const departmentInput = document.getElementById('department');
  populateDatalist('department-list')([]); 
  departmentInput.value = '';
  departmentInput.placeholder = '候補を読み込み中...';
  departmentInput.classList.remove('input-error');

  if (selectedBu) {
    google.script.run.withSuccessHandler(suggestions => {
      populateDatalist('department-list')(suggestions);
      departmentInput.placeholder = suggestions.length > 0 ? '候補から選択してください' : '候補が見つかりません';
    }).withFailureHandler(() => { 
      departmentInput.placeholder = '候補の読み込みに失敗'; 
    }).getDepartmentSuggestions(selectedBu);
  } else {
    departmentInput.placeholder = '先に対象BUを選択してください';
  }
}

function validateInputMatch(inputId, datalistId, labelName) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  const datalist = document.getElementById(datalistId);
  if (val === '') {
    input.classList.remove('input-error');
    return { valid: true };
  }
  const options = Array.from(datalist.options).map(opt => opt.value);
  if (!options.includes(val)) {
    input.classList.add('input-error');
    return { valid: false, message: `「${labelName}」はリストにある項目から選択してください。\n(入力された値: ${val})` };
  }
  input.classList.remove('input-error');
  return { valid: true };
}

myForm.addEventListener('submit', function(e) {
  e.preventDefault();
  messageDiv.style.display = 'none';
  for (const v of fieldValidations) {
    const result = validateInputMatch(v.id, v.list, v.label);
    if (!result.valid) {
      showModal(result.message, () => document.getElementById(v.id).focus());
      return; 
    }
  }
  submitButton.innerHTML = '<span class="spinner"></span>登録処理中...';
  submitButton.disabled = true;
  registerAnotherLink.style.display = 'none';

  const formObject = Object.fromEntries(new FormData(this).entries());
  formObject.amount = parseNumber(formObject.amount);
  
  Object.keys(formObject).forEach(key => {
    if (key.startsWith('monthly_')) {
      formObject[key] = parseNumber(formObject[key]);
    }
  });
  
  google.script.run
  .withSuccessHandler(function(response) {
    messageDiv.style.display = 'block';
    if (response.success) {
      messageDiv.className = 'success';
      myForm.style.display = 'none';
      registerAnotherLink.style.display = 'block';
    } else {
      messageDiv.className = 'error';
    }
    messageDiv.innerText = response.message;
    submitButton.innerHTML = '登録する';
    submitButton.disabled = false;
  })
  .withFailureHandler(function(error) {
    messageDiv.style.display = 'block';
    messageDiv.className = 'error';
    messageDiv.innerText = 'スクリプトの実行に失敗しました: ' + error.message;
    submitButton.innerHTML = '登録する';
    submitButton.disabled = false;
  })
  .processForm(formObject);
});

registerAnotherLink.addEventListener('click', function(e) {
  e.preventDefault();
  myForm.reset();
  document.querySelectorAll('input').forEach(input => input.classList.remove('input-error'));
  document.getElementById('monthly-amounts-area').style.display = 'none';
  document.getElementById('monthly-grid').innerHTML = '';
  document.getElementById('monthly-total-display').innerText = '0';
  
  myForm.style.display = 'block';
  messageDiv.style.display = 'none';
  registerAnotherLink.style.display = 'none';
  updateDepartmentSuggestions();
  google.script.run.withSuccessHandler(populateDatalist('parent-id-list')).getParentIdSuggestions();
});
</script>
</body>
</html>
