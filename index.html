<style>
body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 2rem; background-color: #f9f9f9; color: #333; }

.monthly-item input { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: right; border: 1px solid #b3d7ff; border-radius: 4px; padding: 0.5rem; font-size: 1rem; }
.monthly-total { text-align: right; font-weight: bold; font-size: 1.2rem; color: #0056b3; margin-top: 1.5rem; border-top: 2px solid #b3d7ff; padding-top: 1rem; }

button.submit-btn { background-color: #007bff; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; width: 100%; margin-top: 1rem;}
button.submit-btn:disabled { background-color: #a0a0a0; cursor: not-allowed; }
#message { margin-top: 1.5rem; padding: 1rem; border-radius: 5px; text-align: center; }
.success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
.error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
hr { border: none; border-top: 1px solid #eee; margin: 2rem 0; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle;}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-box { background: white; padding: 2rem; border-radius: 8px; max-width: 400px; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
.modal-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem; color: #d9534f; }
.modal-text { margin-bottom: 1.5rem; white-space: pre-wrap; line-height: 1.5; }
.modal-button { color: white; padding: 0.5rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin: 0 0.5rem; transition: background-color 0.2s; }
.btn-ok { background-color: #007bff; } .btn-ok:hover { background-color: #0056b3; }
.input-error { background-color: #ffe6e6 !important; border: 1px solid #dc3545 !important; color: #721c24; }
</style>
</head>
<body>
<div class="header-nav"><a href="<?= topUrl ?>" class="back-button" target="_top">← TOPに戻る</a></div>

<div class="container">
  <h1>MPコード新規登録フォーム</h1>
  <p class="description">ここでは「MPコードマスタ」の新規登録を行います。必須項目を正しく入力してください。</p>
  
  <form id="myForm">
  <div class="form-group">
  <label for="slideParentId">計画スライドの場合、親IDを指定（新規の場合は空欄）:
  <small>※親IDは 6 桁で入力してください</small>
  </label>
  <input type="text" id="slideParentId" name="slideParentId" placeholder="例: 000001" list="parent-id-list">
  <datalist id="parent-id-list"></datalist>
  </div>
  <hr>
  <h3>▼ 必須項目</h3>
  <div class="form-group">
  <label for="bu">対象BU:</label>
  <input type="text" id="bu" name="bu" required list="bu-list">
  <datalist id="bu-list"></datalist>
  </div>

  <div class="form-group" id="target-sheet-group" style="display:none;">
    <label for="target-sheet">保存先シート:</label>
    <select id="target-sheet" name="target-sheet" style="width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px;">
      <option value="">-- シートを選択してください --</option>
    </select>
  </div>

  <div class="form-group">
  <label for="department">計上部門:</label>
  <input type="text" id="department" name="department" required list="department-list" placeholder="先に対象BUを選択してください" autocomplete="off">
  <datalist id="department-list"></datalist>
  </div>
  <div class="form-group">
  <label for="account">勘定科目:</label>
  <input type="text" id="account" name="account" required list="account-list">
  <datalist id="account-list"></datalist>
  </div>
  <div class="form-group">
  <label for="pjc">対象PJC:</label>
  <input type="text" id="pjc" name="pjc" list="pjc-list">
  <datalist id="pjc-list"></datalist>
  </div>

  <div class="form-group">
  <label>対象期間:</label>
  <div class="period-group">
    <input type="date" id="startDate" name="startDate" required onchange="generateMonthlyInputs()">
    <span>〜</span>
    <input type="date" id="endDate" name="endDate" required onchange="generateMonthlyInputs()">
  </div>
  </div>

  <div class="form-group" id="monthly-amounts-area" style="display:none;">
    <div class="monthly-container">
      
      <div class="bulk-input-area">
        <label style="color:#0056b3; font-size: 0.9rem; margin-bottom: 0;">一括入力コントロール（選択期間全体に反映されます）</label>
        <div class="bulk-controls">
          <input type="text" id="bulk-amount" placeholder="金額を入力" oninput="formatBulkInput(this)">
          <button type="button" class="btn-bulk btn-bulk-reflect" onclick="applyBulkAmount('monthly')">単月額として毎月に反映</button>
          <button type="button" class="btn-bulk btn-bulk-divide" onclick="applyBulkAmount('divide')">総額として期間で均等按分</button>
        </div>
      </div>

      <div class="monthly-title">各月の金額を入力・調整してください：</div>
      <div id="monthly-grid"></div>
      <div class="monthly-total">合計: <span id="monthly-total-display">0</span> 円</div>
    </div>
  </div>

  <input type="hidden" id="amount" name="amount" required>

  <div class="form-group">
  <label for="summary">発番理由:</label>
  <input type="text" id="summary" name="summary" required>
  </div>

  <h3>▼ 任意項目</h3>
  <div class="form-group">
  <label for="vendor">仕入先:</label>
  <input type="text" id="vendor" name="vendor" list="vendor-list">
  <datalist id="vendor-list"></datalist>
  </div>

  <div class="form-group">
  <label for="notes">備考1:
  <small>※各月の按分金額等があれば記載してください</small>
  </label>
  <input type="text" id="notes" name="notes">
  </div>

  <button type="submit" id="submitButton" class="submit-btn">登録する</button>
  </form>
  <div id="message" style="display:none;"></div>
  <a href="#" id="register-another" style="display:none; margin-top: 1rem; text-align: center; display: block;" >別のコードを登録する</a>
</div>

<div id="custom-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">入力エラー</div>
    <div class="modal-text" id="modal-message"></div>
    <div id="modal-buttons-ok" style="display: block;"><button class="modal-button btn-ok" id="modal-ok-btn">OK</button></div>
  </div>
</div>

<script>
const myForm = document.getElementById('myForm');
const submitButton = document.getElementById('submitButton');
const messageDiv = document.getElementById('message');
const registerAnotherLink = document.getElementById('register-another');
const modalOverlay = document.getElementById('custom-modal');
const modalMessage = document.getElementById('modal-message');
const modalOkBtn = document.getElementById('modal-ok-btn');
let modalCallback = null; let globalRouteMap = [];

document.addEventListener('DOMContentLoaded', () => {
  google.script.run
  .withSuccessHandler(response => {
    if (response.error) { alert("データの読み込みに失敗しました: " + response.error); return; }
    globalRouteMap = response.routeMap || [];
    populateDatalist('parent-id-list')(response.parentIds);
    populateDatalist('bu-list')(response.bus);
    populateDatalist('pjc-list')(response.pjcs);
    populateDatalist('account-list')(response.accounts);
    populateDatalist('vendor-list')(response.vendors);
  })
  .getInitialFormData();

  document.getElementById('bu').addEventListener('change', updateDepartmentSuggestions);
  document.getElementById('bu').addEventListener('input', handleBuChange);
  modalOkBtn.addEventListener('click', () => { modalOverlay.style.display = 'none'; if (modalCallback) { modalCallback(); modalCallback = null; } });
});

function parseNumber(value) { if (!value) return 0; const num = Number(value.toString().replace(/,/g, '')); return isNaN(num) ? 0 : num; }
function formatAndCalculate(el) { let val = el.value.replace(/,/g, '').replace(/[^\d.-]/g, ''); el.value = (val !== '' && val !== '-') ? Number(val).toLocaleString() : val; calculateTotal(); }
function formatBulkInput(el) { let val = el.value.replace(/,/g, '').replace(/[^\d.-]/g, ''); el.value = (val !== '' && val !== '-') ? Number(val).toLocaleString() : val; }

function applyBulkAmount(mode) {
  const bulkInputStr = document.getElementById('bulk-amount').value;
  const amount = parseNumber(bulkInputStr);
  if (isNaN(amount) || bulkInputStr === '') return;
  const inputs = document.querySelectorAll('.monthly-input');
  if (inputs.length === 0) return;

  if (mode === 'monthly') {
    inputs.forEach(input => { input.value = amount.toLocaleString(); });
  } else if (mode === 'divide') {
    const count = inputs.length; const baseAmount = Math.floor(amount / count); const remainder = amount % count;
    inputs.forEach((input, index) => { const val = (index === 0) ? (baseAmount + remainder) : baseAmount; input.value = val.toLocaleString(); });
  }
  calculateTotal();
}

function generateMonthlyInputs() {
  const startDateStr = document.getElementById('startDate').value; const endDateStr = document.getElementById('endDate').value;
  const area = document.getElementById('monthly-amounts-area'); const grid = document.getElementById('monthly-grid');
  if (!startDateStr || !endDateStr || startDateStr > endDateStr) { area.style.display = 'none'; grid.innerHTML = ''; calculateTotal(); return; }
  
  area.style.display = 'block'; grid.innerHTML = '';
  const [sy, sm] = startDateStr.split('-').map(Number); const [ey, em] = endDateStr.split('-').map(Number);
  let current = new Date(sy, sm - 1, 1); const targetEnd = new Date(ey, em - 1, 1);
  const qContainers = {}; 
  
  while (current <= targetEnd) {
    const yyyy = current.getFullYear(); const m = current.getMonth() + 1; const mm = String(m).padStart(2, '0'); const ym = `${yyyy}/${mm}`;
    const fiscalYear = m <= 3 ? yyyy - 1 : yyyy; let q = ''; let qIndex = 0; 
    if (m >= 4 && m <= 6)      { q = '1Q'; qIndex = m - 4; }
    else if (m >= 7 && m <= 9) { q = '2Q'; qIndex = m - 7; }
    else if (m >= 10 && m <= 12){ q = '3Q'; qIndex = m - 10; }
    else                       { q = '4Q'; qIndex = m - 1; } 
    const qKey = `${fiscalYear}_${q}`;
    
    if (!qContainers[qKey]) {
      const qGroup = document.createElement('div'); qGroup.className = 'quarter-group';
      const qLabel = document.createElement('div'); qLabel.className = 'quarter-label'; qLabel.innerText = `${fiscalYear}年度 ${q}`; qGroup.appendChild(qLabel);
      const qGrid = document.createElement('div'); qGrid.className = 'quarter-grid';
      for(let i = 0; i < 3; i++){ const slot = document.createElement('div'); slot.className = 'monthly-item empty'; qGrid.appendChild(slot); }
      qGroup.appendChild(qGrid); qContainers[qKey] = { group: qGroup, grid: qGrid }; grid.appendChild(qGroup);
    }
    const targetSlot = qContainers[qKey].grid.children[qIndex];
    targetSlot.className = 'monthly-item';
    targetSlot.innerHTML = `<label>${ym}</label><input type="text" class="monthly-input" data-ym="${ym}" value="0" oninput="formatAndCalculate(this)" onfocus="this.select()">`;
    current.setMonth(current.getMonth() + 1);
  }
  calculateTotal();
}

function calculateTotal() {
  const inputs = document.querySelectorAll('.monthly-input'); let total = 0;
  inputs.forEach(input => { total += parseNumber(input.value); });
  document.getElementById('monthly-total-display').innerText = total.toLocaleString();
  document.getElementById('amount').value = total; 
}

function handleBuChange() {
  const selectedBu = document.getElementById('bu').value;
  const targetSheetGroup = document.getElementById('target-sheet-group'); const targetSheetSelect = document.getElementById('target-sheet');
  targetSheetSelect.innerHTML = '<option value="">-- シートを選択してください --</option>';
  if (!selectedBu) { targetSheetGroup.style.display = 'none'; return; }
  const availableRoutes = globalRouteMap.filter(r => r[0] === selectedBu);

  if (availableRoutes.length === 1) {
    const option = document.createElement('option'); option.value = JSON.stringify({ sheet: availableRoutes[0][1], url: availableRoutes[0][2] || "" }); option.text = availableRoutes[0][1]; option.selected = true;
    targetSheetSelect.appendChild(option); targetSheetGroup.style.display = 'none';
  } else if (availableRoutes.length > 1) {
    availableRoutes.forEach(r => { const option = document.createElement('option'); option.value = JSON.stringify({ sheet: r[1], url: r[2] || "" }); option.text = r[1]; targetSheetSelect.appendChild(option); });
    targetSheetGroup.style.display = 'block';
  } else { targetSheetGroup.style.display = 'none'; }
}

function showModal(msg, cb, title = '入力エラー') { document.getElementById('modal-title').textContent = title; modalMessage.textContent = msg; modalCallback = cb; modalOverlay.style.display = 'flex'; }
function populateDatalist(id) { return function(sug) { const dl = document.getElementById(id); dl.innerHTML = ''; if (sug && sug.length > 0) { sug.forEach(item => { const op = document.createElement('option'); op.value = item; dl.appendChild(op); }); } }; }

function updateDepartmentSuggestions() {
  const selectedBu = document.getElementById('bu').value; const deptInput = document.getElementById('department');
  populateDatalist('department-list')([]); deptInput.value = ''; deptInput.placeholder = '候補を読み込み中...';
  if (selectedBu) { google.script.run.withSuccessHandler(sug => { populateDatalist('department-list')(sug); deptInput.placeholder = sug.length > 0 ? '候補から選択してください' : '候補が見つかりません'; }).getDepartmentSuggestions(selectedBu); } 
  else { deptInput.placeholder = '先に対象BUを選択してください'; }
}

myForm.addEventListener('submit', function(e) {
  e.preventDefault(); messageDiv.style.display = 'none';
  if (document.getElementById('target-sheet-group').style.display === 'block' && !document.getElementById('target-sheet').value) { showModal("保存先シートを選択してください。", null); return; }
  submitButton.innerHTML = '<span class="spinner"></span>登録処理中...'; submitButton.disabled = true; registerAnotherLink.style.display = 'none';
  const formObject = Object.fromEntries(new FormData(this).entries()); formObject.amount = parseNumber(formObject.amount);
  if (document.getElementById('target-sheet').value) { const targetData = JSON.parse(document.getElementById('target-sheet').value); formObject.targetSheetName = targetData.sheet; formObject.targetUrl = targetData.url; }

  const monthlyAmounts = {};
  document.querySelectorAll('.monthly-input').forEach(input => { const ym = input.getAttribute('data-ym'); if (ym) { monthlyAmounts[ym] = parseNumber(input.value); } });
  formObject.monthlyAmounts = monthlyAmounts;

  google.script.run
  .withSuccessHandler(function(res) {
    messageDiv.style.display = 'block';
    if (res.success) { messageDiv.className = 'success'; myForm.style.display = 'none'; registerAnotherLink.style.display = 'block'; } 
    else { messageDiv.className = 'error'; }
    messageDiv.innerText = res.message; submitButton.innerHTML = '登録する'; submitButton.disabled = false;
  })
  .withFailureHandler(function(err) { messageDiv.style.display = 'block'; messageDiv.className = 'error'; messageDiv.innerText = 'エラー: ' + err.message; submitButton.innerHTML = '登録する'; submitButton.disabled = false; })
  .processForm(formObject);
});

registerAnotherLink.addEventListener('click', function(e) {
  e.preventDefault(); myForm.reset(); document.getElementById('monthly-amounts-area').style.display = 'none'; document.getElementById('monthly-grid').innerHTML = ''; document.getElementById('monthly-total-display').innerText = '0'; document.getElementById('target-sheet-group').style.display = 'none';
  myForm.style.display = 'block'; messageDiv.style.display = 'none'; registerAnotherLink.style.display = 'none'; updateDepartmentSuggestions();
  google.script.run.withSuccessHandler(populateDatalist('parent-id-list')).getParentIdSuggestions();
});
</script>
</body>
</html>
