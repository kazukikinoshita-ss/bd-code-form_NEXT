<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: #f8f9fa; color: #212529; }
    .header-nav { margin: 15px auto 0; max-width: 95%; display: flex; justify-content: space-between; align-items: center; }
    .back-button { display: inline-block; text-decoration: none; font-size: 0.9rem; color: #fff; background-color: #6c757d; padding: 0.5rem 1rem; border-radius: 5px; transition: background-color 0.2s; }
    .back-button:hover { background-color: #5a6268; color: #fff; }
    .container { max-width: 95%; margin: 20px auto; background-color: #fff; padding: 25px; border-radius: 8px; border: 1px solid #dee2e6; }
    h1 { color: #343a40; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
    h3 { color: #495057; margin-top: 30px; border-bottom: 1px solid #dee2e6; padding-bottom: 5px;}
    label { font-weight: bold; font-size: 14px; color: #495057; display: block; margin-bottom: 5px;}
    .filters { margin-bottom: 20px; padding: 20px; border: 1px solid #dee2e6; border-radius: 5px; background-color: #f8f9fa;}
    .filter-group { display: flex; flex-direction: column; margin-bottom: 15px; }
    .budget-code-group { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px dashed #ced4da; }
    
    #sheet-select { width: 100%; max-width: 450px; padding: 12px; border: 2px solid #007bff; border-radius: 6px; font-size: 16px; font-weight: bold; color: #333; cursor: pointer; background-color: #fff; }
    #sheet-select:focus { outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.5); }
    .sheet-select-area { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 2px dashed #ced4da; }

    .common-settings { display: none; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed #ced4da; }
    .filter-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
    .filter-group input[type="text"], .filter-group select { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; margin-top: 5px;}
    .checkbox-container { max-height: 150px; overflow-y: auto; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; background-color: #fff; margin-top: 5px; }
    .checkbox-item { display: flex; align-items: center; font-weight: normal; margin-bottom: 5px; }
    .select-all-label { display: block; padding-bottom: 5px; margin-bottom: 5px; border-bottom: 1px solid #e0e0e0; font-weight: bold; }
    .date-range-group { display: flex; gap: 10px; align-items: center; justify-content: flex-start; }
    .date-range-group input[type="month"] { width: 150px; flex: 0 0 auto; padding: 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; margin-top: 5px; }
    
    button { font-size: 16px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; transition: background-color 0.2s; height: 45px; padding: 0 20px; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background-color: #007bff; color: white; }
    .btn-primary:hover { background-color: #0056b3; }
    .btn-success { background-color: #28a745; color: white; }
    button:disabled { background-color: #adb5bd; cursor: not-allowed; }
    
    .results { display: none; }
    .result-card { border: 1px solid #dee2e6; border-radius: 5px; margin-bottom: 15px; background: #fff; }
    .result-header { display: flex; justify-content: space-between; align-items: center; background-color: #e9ecef; padding: 10px 15px; border-bottom: 1px solid #dee2e6; font-weight: bold; }
    .result-body { padding: 15px; }
    .result-section { margin-bottom: 15px; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .info-item label, .remark-item label { font-size: 12px; color: #6c757d; }
    .info-item .value { font-size: 14px; font-weight:bold; color: #333; }
    .remark-item textarea { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; margin-top: 3px; resize: vertical; }

    .monthly-container { overflow-x: auto; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; background-color: #f8f9fa; }
    .monthly-items-wrapper { display: flex; gap: 15px; }
    .monthly-item { flex: 0 0 150px; }
    .monthly-item label { font-size: 12px; color: #007bff; font-weight: bold; }
    .value-display { font-size: 11px; color: #6c757d; margin-bottom: 3px; font-family: monospace;}
    .mp-value-display { font-size: 11px; color: #007bff; margin-bottom: 2px; font-weight: bold; font-family: monospace; min-height: 16px;}
    
    .pagination-controls { margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .page-input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
    #status { font-size: 14px; padding: 10px; border-radius: 4px; margin-top: 15px; }
    .status-success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
    .status-error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-box { background-color: #fff; padding: 25px; border-radius: 8px; border: 1px solid #dee2e6; width: 90%; max-width: 400px; text-align: center; }
    .modal-title { font-size: 18px; font-weight: bold; color: #343a40; margin-bottom: 15px; }
    .modal-text { font-size: 15px; color: #495057; margin-bottom: 25px; white-space: pre-wrap; line-height: 1.5; }

    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; color: white; }
    .loader-lg { border: 6px solid #f3f3f3; border-top: 6px solid #007bff; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="header-nav"><a href="#" id="top-link" class="back-button">← メニューに戻る</a></div>

<div class="container">
  <h1>金額データ一括検索・更新ツール</h1>
  <div class="filters">
    <h3>1. 検索対象の指定</h3>
    
    <div class="budget-code-group">
      <label class="checkbox-item" style="font-weight: bold;"><input type="checkbox" id="use-budget-code-search" onchange="handleSearchModeChange()"> MPコードで全シートを直接検索する</label>
      <input type="text" id="budget-code-search" placeholder="MPコードを入力 (例: 000001_001)" disabled style="margin-top: 5px; width: 100%; max-width: 400px; padding: 8px;">
    </div>

    <div class="sheet-select-area" id="sheet-select-area">
      <label>▼ まず最初に対象 of シートを選択してください</label>
      <select id="sheet-select" onchange="loadSheetData()">
        <option value="">-- シートの読み込み中... --</option>
      </select>
    </div>

    <div class="common-settings" id="common-settings-area">
      <div class="filter-group">
        <label>表示期間</label>
        <div class="date-range-group"><input type="month" id="start-date-select"><span>〜</span><input type="month" id="end-date-select"></div>
      </div>
    </div>

    <div class="filter-grid" id="filter-grid-area">
      <div class="filter-group">
        <label>グループ名(FY26)</label>
        <div id="dept-filter-container">読み込み中...</div>
      </div>
      <div class="filter-group">
        <label>集約科目 (マスタ逆引き)</label>
        <div id="subject-filter-container">読み込み中...</div>
      </div>
      <div class="filter-group">
        <label>その他 (AND条件絞り込み)</label>
        <select id="other-column"></select>
        <input type="text" id="other-keyword" placeholder="キーワードを入力" list="other-suggestions">
        <datalist id="other-suggestions"></datalist>
      </div>
    </div>

    <div class="button-group" style="margin-top: 20px; display: none;" id="search-btn-area">
      <button id="search-button" class="btn-primary" onclick="searchData()">この条件で検索を実行</button>
    </div>
  </div>
  
  <div id="status"></div>
  <div class="results">
    <h3>2. 検索結果・金額更新</h3>
    <div id="mp-data-error-area" style="margin-bottom: 10px; color: #dc3545; font-weight: bold;"></div>
    <div id="pagination-top" class="pagination-controls"></div>
    <div id="result-area"></div>
    <div id="pagination-bottom" class="pagination-controls"></div>
    <div style="text-align: right; margin-top: 20px;">
      <button id="update-all-button" class="btn-success" onclick="updateAllData()">表示されている結果をすべて更新</button>
    </div>
  </div>
</div>

<div id="custom-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">完了</div>
    <div class="modal-text" id="modal-message"></div>
    <div style="margin-top:15px;"><button class="btn-primary" onclick="closeCustomModal()" style="height:35px; padding:0 30px;">OK</button></div>
  </div>
</div>

<div id="loading-overlay" class="loading-overlay">
  <div class="loader-lg"></div>
  <div id="loading-message" style="margin-top: 15px; font-size: 18px; font-weight: bold;"></div>
</div>

<script>
let g_masterData = null; 
let PAGE_SIZE = 10; 
let currentPage = 1; 
let allFilteredItems = []; 
let currentSearchDateRange = null;

window.onload = function() {
  setLoading(true, '初期設定を読み込んでいます...');
  google.script.run.withSuccessHandler(url => { document.getElementById('top-link').href = url; }).getWebAppUrl();
  google.script.run
    .withSuccessHandler(initSettings)
    .withFailureHandler(err => { setLoading(false); showStatus('設定の読み込みに失敗しました: ' + err.message, true); })
    .getInitialSettings();
};

function initSettings(settings) {
  const sheetSelect = document.getElementById('sheet-select');
  sheetSelect.innerHTML = '<option value="">-- 対象シートを選択してください --</option>';
  settings.routes.forEach(r => {
    const opt = document.createElement('option'); 
    opt.value = r.index; 
    opt.text = r.sheet; 
    sheetSelect.appendChild(opt);
  });
  if (settings.defaultStartDate) document.getElementById('start-date-select').value = settings.defaultStartDate;
  if (settings.defaultEndDate) document.getElementById('end-date-select').value = settings.defaultEndDate;
  setLoading(false); showStatus('対象のシートを選択してください。', false);
}

function handleSearchModeChange() {
  const on = document.getElementById('use-budget-code-search').checked;
  document.getElementById('budget-code-search').disabled = !on;
  if (on) {
    document.getElementById('sheet-select-area').style.display = 'none'; 
    document.getElementById('filter-grid-area').style.display = 'none';
    document.getElementById('common-settings-area').style.display = 'block'; 
    document.getElementById('search-btn-area').style.display = 'block';
    document.querySelector('.results').style.display = 'none';
  } else {
    document.getElementById('sheet-select-area').style.display = 'block'; 
    document.getElementById('budget-code-search').value = '';
    loadSheetData(); 
  }
}

/**
 * 💡 新設計：シートを選択した1回だけ、すべてのベースレコードとMPレコードを合流させてロードします。
 */
function loadSheetData() {
  const selectedRouteIndex = document.getElementById('sheet-select').value;
  if (selectedRouteIndex === "") {
    document.getElementById('common-settings-area').style.display = 'none'; 
    document.getElementById('filter-grid-area').style.display = 'none';
    document.getElementById('search-btn-area').style.display = 'none'; 
    document.querySelector('.results').style.display = 'none'; 
    return;
  }
  setLoading(true, `指定シートデータの高速一括ロード・JOIN解析中 (最大3000行)...`);
  google.script.run
    .withSuccessHandler(data => {
      g_masterData = data; // すべての結合データがブラウザのメモリにキャッシュされます
      
      populateCheckboxes('dept-filter-container', data.groups); 
      populateCheckboxes('subject-filter-container', data.subjects); 
      populateSelect('other-column', data.otherHeaders);
      
      document.getElementById('common-settings-area').style.display = 'block'; 
      document.getElementById('filter-grid-area').style.display = 'grid'; 
      document.getElementById('search-btn-area').style.display = 'block'; 
      document.querySelector('.results').style.display = 'none';
      
      document.getElementById('dept-filter-container').removeEventListener('change', updateSuggestions);
      document.getElementById('other-column').removeEventListener('change', updateSuggestions);
      
      document.getElementById('dept-filter-container').addEventListener('change', updateSuggestions); 
      document.getElementById('other-column').addEventListener('change', updateSuggestions);
      
      updateSuggestions(); 
      setLoading(false); 
      showStatus('ロードおよびメモリ格納が完了しました。フィルタはミリ秒単位で高速検索できます。', false);
    })
    .withFailureHandler(err => { setLoading(false); showStatus('シート読込失敗: ' + err.message, true); })
    .getEntireSheetData(selectedRouteIndex); 
}

function updateSuggestions() {
  if (!g_masterData) return;
  const colName = document.getElementById('other-column').value; 
  const datalist = document.getElementById('other-suggestions'); 
  datalist.innerHTML = ''; 
  if (!colName) return;
  const selectedGroups = getSelectedCheckboxes('dept-filter-container');
  const filteredIndex = g_masterData.records.filter(item => { return selectedGroups.length === 0 || selectedGroups.includes(item.g); });
  const uniqueValues = new Set(); 
  filteredIndex.forEach(item => { if (item[colName]) uniqueValues.add(item[colName]); });
  Array.from(uniqueValues).sort().slice(0, 500).forEach(val => { datalist.innerHTML += `<option value="${val}"></option>`; });
}

/**
 * 💡 新設計：検索ボタンを押した瞬間、「ゼロ秒（ミリ秒単位）」でブラウザ上でフィルタリングを実行します。
 */
function searchData() {
  const sDate = document.getElementById('start-date-select').value; 
  const eDate = document.getElementById('end-date-select').value;
  if (sDate > eDate) { alert('表示期間が不正です。'); return; }
  currentSearchDateRange = { startDate: sDate, endDate: eDate };

  // MPコード直接検索の場合は、全シートをマージする必要があるためハイブリッド通信処理を行います
  if (document.getElementById('use-budget-code-search').checked) {
    const bdCode = document.getElementById('budget-code-search').value.trim(); 
    if (!bdCode) { alert("MPコードを入力してください。"); return; }
    setLoading(true, '全シートからMPコードを横断検索中...'); 
    document.querySelector('.results').style.display = 'none'; 
    document.getElementById('mp-data-error-area').innerText = ''; 
    
    google.script.run
      .withSuccessHandler(jsonResponse => {
        try {
          const response = JSON.parse(jsonResponse);
          if (response.searchResults.length === 0) { setLoading(false); showStatus('該当するMPコードが見つかりませんでした。', false); return; }
          
          // 画面用に結合
          response.searchResults.forEach(resItem => {
             resItem.mpData = "__NOT_FOUND__";
          });
          
          g_masterData = {
            records: response.searchResults,
            mpSheetName: 'MP',
            remarksInfo: response.remarksInfo,
            basicInfo: response.basicInfo
          };
          allFilteredItems = response.searchResults;
          currentPage = 1;
          displayLocalResults(response.monthlyHeaders);
          loadMpDataBackground(response.searchResults, response.monthlyHeaders); // ハイブリッド時のバックグラウンド取得
          setLoading(false); 
        } catch(e) { setLoading(false); showStatus("エラー: " + e.message, true); }
      })
      .withFailureHandler(err => { setLoading(false); showStatus("通信エラー: " + err.message, true); })
      .searchDataByMpCode(bdCode, currentSearchDateRange);
    return;
  }

  // 💡 通常のフィルタリング：通信0回で瞬時に配列操作
  const selectedGroups = getSelectedCheckboxes('dept-filter-container'); 
  const selectedSubjects = getSelectedCheckboxes('subject-filter-container'); 
  const otherCol = document.getElementById('other-column').value; 
  const otherKey = document.getElementById('other-keyword').value.toLowerCase();
  
  setLoading(true, 'フィルタリング処理中...'); 
  document.querySelector('.results').style.display = 'none'; 
  document.getElementById('mp-data-error-area').innerText = ''; 
  
  allFilteredItems = g_masterData.records.filter(item => {
    if (selectedGroups.length > 0 && !selectedGroups.includes(item.g)) return false;
    if (selectedSubjects.length > 0 && !selectedSubjects.includes(item.s)) return false;
    if (otherCol && otherKey) { 
      if (!item[otherCol] || !item[otherCol].toLowerCase().includes(otherKey)) return false; 
    }
    return true;
  });
  
  if (allFilteredItems.length === 0) { setLoading(false); showStatus('条件に一致するデータがありませんでした。', false); return; }
  currentPage = 1; 
  
  // 表示用月別日付ヘッダーの抽出
  const monthlyHeaders = g_masterData.dateOptions.map(ymStr => {
    const [y, m] = ymStr.split('-').map(Number);
    return new Date(y, m - 1, 1).getTime();
  }).filter(timeMs => {
    const d = new Date(timeMs);
    const ym = `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}`;
    return ym >= sDate && ym <= eDate;
  });

  displayLocalResults(monthlyHeaders);
  setLoading(false);
}

/**
 * 💡 ページめくり：GASとの通信は一切せず、メモリから10件切り抜いて一瞬で再描画します。
 */
function fetchPageData() {
  const sDate = document.getElementById('start-date-select').value;
  const monthlyHeaders = g_masterData.dateOptions.map(ymStr => {
    const [y, m] = ymStr.split('-').map(Number);
    return new Date(y, m - 1, 1).getTime();
  }).filter(timeMs => {
    const d = new Date(timeMs);
    const ym = `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}`;
    return ym >= sDate && ym <= document.getElementById('end-date-select').value;
  });
  
  displayLocalResults(monthlyHeaders);
}

function displayLocalResults(monthlyHeaders) {
  const total = allFilteredItems.length;
  const startIndex = (currentPage - 1) * PAGE_SIZE; 
  const pageItems = allFilteredItems.slice(startIndex, startIndex + PAGE_SIZE);

  const resultArea = document.getElementById('result-area'); 
  resultArea.innerHTML = ''; 
  document.querySelector('.results').style.display = 'block';
  
  window.currentMonthlyHeaders = monthlyHeaders; 
  window.currentRemarksInfo = g_masterData.remarksInfo;

  let html = '';
  pageItems.forEach(data => {
    const bdCode = data['MPコード'] || ''; 
    const parts = data.rowNumber.split("___");
    html += `<div class="result-card" id="result-${data.rowNumber}">`;
    html += `<div class="result-header"><span>${bdCode}</span>`;
    html += `<button class="btn-success" onclick="updateSingleItem('${data.rowNumber}')">この行を更新</button></div>`;
    html += `<div class="result-body">`;
    html += `<div class="result-section"><div class="info-grid">`;
    
    g_masterData.basicInfo.readOnly.forEach(h => { 
      if(h !== 'MPコード') html += `<div class="info-item"><label>${h}</label><div class="value">${data[h]||'--'}</div></div>`; 
    });
    
    html += `</div></div>`;
    html += `<div class="result-section"><h5>備考</h5><div class="info-grid">`;
    
    g_masterData.remarksInfo.editable.forEach(h => { 
      html += `<div class="remark-item"><label>${h}</label><textarea id="input-${h}-${data.rowNumber}" data-original="${data[h]||''}">${data[h]||''}</textarea></div>`; 
    });
    
    html += `</div></div>`;
    html += `<div class="result-section"><h5>月額データ</h5><div class="monthly-container"><div class="monthly-items-wrapper">`;
    
    monthlyHeaders.forEach(ts => {
        const d = new Date(Number(ts)); 
        const ym = `${d.getFullYear()}/${('0'+(d.getMonth()+1)).slice(-2)}`; 
        const valRaw = (data[ts] !== undefined && data[ts] !== null) ? Number(data[ts]) : 0;
        
        // 💡 新設計：すでに事前結合されているMP金額を出力（遅延時間・タイムラグ無し）
        let mpValDisplay = '該当なし';
        if (data.mpData && data.mpData !== "__NOT_FOUND__") {
          const val = data.mpData[ts];
          mpValDisplay = (val === null || val === undefined) ? '0' : Number(val).toLocaleString();
        }
        const mpLabel = g_masterData.mpSheetName || 'MP';

        html += `<div class="monthly-item">` +
                  `<label>${ym}</label>` +
                  `<div class="mp-value-display" id="mp-${data.rowNumber}-${ts}">${mpLabel}: ${mpValDisplay}</div>` +
                  `<div class="value-display">現在額: ${valRaw.toLocaleString()} 円</div>` +
                  `<input type="number" id="input-${ts}-${data.rowNumber}" placeholder="更新額" data-original="${valRaw}">` +
                `</div>`;
    });
    
    html += `</div></div></div></div></div>`;
  });
  
  resultArea.innerHTML = html; 
  renderPagination(total); 
  showStatus(`${total}件中 ${startIndex + 1}〜${Math.min(startIndex + PAGE_SIZE, total)}件を表示`, false);
}

function loadMpDataBackground(results, monthlyHeaders) {
  if(!results.length) return; 
  const ids = results.map(r=>r.rowNumber); 
  const bds = results.map(r=>r['MPコード']); 
  const mpDataErrorArea = document.getElementById('mp-data-error-area'); 
  mpDataErrorArea.innerText = '';
  
  google.script.run.withSuccessHandler(res => {
      if(res.error) { mpDataErrorArea.innerText = "外部データ取得エラー: " + res.error; return; }
      const map = res.mpDataMap; 
      const label = res.mpSheetName;
      g_masterData.mpSheetName = label;
      
      ids.forEach((rNum) => {
          const dataForThisRow = map[rNum];
          const matchedItem = allFilteredItems.find(item => item.rowNumber === rNum);
          if (matchedItem) {
            matchedItem.mpData = dataForThisRow;
          }
          monthlyHeaders.forEach(ts => {
              const el = document.getElementById(`mp-${rNum}-${ts}`); 
              if(!el) return; 
              let displayVal = '';
              if (dataForThisRow === undefined || dataForThisRow === "__NOT_FOUND__") { displayVal = '該当なし'; } 
              else { const val = dataForThisRow[ts]; displayVal = (val === null || val === undefined) ? '0' : Number(val).toLocaleString(); }
              el.innerText = `${label}: ${displayVal}`;
          });
      });
  }).withFailureHandler(err => { mpDataErrorArea.innerText = "通信エラー: " + err.message; }).getMpDataOnly(ids, bds);
}

function populateCheckboxes(id, list) {
  const container = document.getElementById(id); 
  container.innerHTML = '';
  const allLabel = document.createElement('label'); 
  allLabel.className='select-all-label'; 
  const allCb = document.createElement('input'); 
  allCb.type='checkbox'; 
  allCb.checked=true;
  
  allLabel.appendChild(allCb); 
  allLabel.appendChild(document.createTextNode(' すべて選択/解除')); 
  container.appendChild(allLabel);
  
  const div = document.createElement('div'); 
  div.className='checkbox-container';
  list.forEach(val => { 
    const l = document.createElement('label'); 
    l.className='checkbox-item'; 
    const cb = document.createElement('input'); 
    cb.type='checkbox'; 
    cb.value=val; 
    cb.checked=true; 
    l.appendChild(cb); 
    l.appendChild(document.createTextNode(' ' + val)); 
    div.appendChild(l); 
  });
  
  container.appendChild(div);
  allCb.addEventListener('change', e => { div.querySelectorAll('input').forEach(c => c.checked = e.target.checked); if(id=='dept-filter-container') updateSuggestions(); });
  div.addEventListener('change', () => { if(id=='dept-filter-container') updateSuggestions(); });
}

function populateSelect(id, list) { 
  const s = document.getElementById(id); 
  s.innerHTML = '<option value="">-- 選択 --</option>'; 
  list.forEach(v => { const o = document.createElement('option'); o.value=v; o.text=v; s.appendChild(o); }); 
}

function getSelectedCheckboxes(id) { 
  return Array.from(document.querySelectorAll(`#${id} .checkbox-container input:checked`)).map(c=>c.value); 
}

function setLoading(b, msg='') { 
  if (b) { 
    document.getElementById('loading-message').innerText = msg; 
    document.getElementById('loading-overlay').style.display = 'flex'; 
  } else { 
    document.getElementById('loading-overlay').style.display = 'none'; 
  } 
}

function showStatus(msg, isErr) { 
  const s = document.getElementById('status'); 
  s.className = isErr ? 'status-error' : 'status-success'; 
  s.innerHTML = msg; 
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  let html = `<button onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lt;</button> `;
  html += `<input type="number" class="page-input" value="${currentPage}" onchange="jumpToPage(this.value, ${totalPages})" min="1" max="${totalPages}"><span> / ${totalPages}</span> <button onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&gt;</button>`;
  document.getElementById('pagination-top').innerHTML = html; 
  document.getElementById('pagination-bottom').innerHTML = html;
}

function goToPage(p) { currentPage = p; fetchPageData(); }
function jumpToPage(val, max) { let p = parseInt(val, 10); if (isNaN(p) || p < 1) p = 1; if (p > max) p = max; currentPage = p; fetchPageData(); }

function showCustomModal(msg) {
  document.getElementById('modal-message').innerText = msg;
  document.getElementById('custom-modal').style.display = 'flex';
}

function closeCustomModal() {
  document.getElementById('custom-modal').style.display = 'none';
  if (document.getElementById('use-budget-code-search').checked) {
    searchData();
  } else {
    // 💡 更新後は、シートの全最新データ(他人の更新分含む)を再取得してから再表示
    loadSheetData();
  }
}

/**
 * 💡 楽観的ロック更新（単一）
 * 入力された変更後の値(updates)だけでなく、ロード時点のセルの値(originals)もあわせてGASに送り、
 * 誰かに上書きされていないかを検証します。
 */
function updateSingleItem(rowNum) {
  const updates = {}; 
  const originals = {};
  let hasDiff = false;
  
  window.currentRemarksInfo.editable.forEach(h => { 
    const el = document.getElementById(`input-${h}-${rowNum}`); 
    if (el && el.value !== el.dataset.original) { 
      updates[h] = el.value; 
      originals[h] = el.dataset.original;
      hasDiff = true; 
    } 
  });
  
  window.currentMonthlyHeaders.forEach(ts => { 
    const el = document.getElementById(`input-${ts}-${rowNum}`); 
    if (el && el.value !== '') { 
      updates[ts] = el.value; 
      originals[ts] = el.dataset.original || "0";
      hasDiff = true; 
    } 
  });
  
  if(!hasDiff) { alert('変更がありません'); return; } 
  if(!confirm('競合チェックを行って更新を実行しますか？')) return;
  
  setLoading(true, 'セルの競合チェックおよび書き込みを実行中...'); 
  google.script.run
    .withSuccessHandler((msg) => { 
      setLoading(false); 
      showCustomModal(msg); 
    })
    .withFailureHandler((err) => {
      setLoading(false);
      alert(err.message); // 競合エラーメッセージ等をトーストで警告
    })
    .updateMultipleDataWithConflictCheck([{ rowNumber: rowNum, updates: updates, originals: originals }]);
}

/**
 * 💡 楽観的ロック更新（一括）
 */
function updateAllData() {
  const allUpdates = [];
  document.querySelectorAll('.result-card').forEach(card => {
      const rowNum = card.id.replace('result-', ''); 
      const updates = {}; 
      const originals = {};
      let hasDiff = false;
      
      window.currentRemarksInfo.editable.forEach(h => { 
        const el = document.getElementById(`input-${h}-${rowNum}`); 
        if (el && el.value !== el.dataset.original) { 
          updates[h] = el.value; 
          originals[h] = el.dataset.original;
          hasDiff = true; 
        } 
      });
      
      window.currentMonthlyHeaders.forEach(ts => { 
        const el = document.getElementById(`input-${ts}-${rowNum}`); 
        if (el && el.value !== '') { 
          updates[ts] = el.value; 
          originals[ts] = el.dataset.original || "0";
          hasDiff = true; 
        } 
      });
      if(hasDiff) {
        allUpdates.push({ rowNumber: rowNum, updates: updates, originals: originals });
      }
  });
  
  if(allUpdates.length === 0) { alert('変更がありません'); return; } 
  if(!confirm(`${allUpdates.length}件を、競合チェックを行って一括更新しますか？`)) return;
  
  setLoading(true, '全データの更新競合チェック・一括反映中...'); 
  google.script.run
    .withSuccessHandler((msg) => { 
      setLoading(false); 
      showCustomModal(msg); 
    })
    .withFailureHandler((err) => {
      setLoading(false);
      alert(err.message);
    })
    .updateMultipleDataWithConflictCheck(allUpdates);
}
</script>
